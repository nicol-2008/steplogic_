<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepL∞gic | Metaverso</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <a href="#inicio" class="logo-container">StepL<span>∞</span>gic</a>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#misiones">Misiones</a></li>
            <li><a href="#mundos">Mundos</a></li>
            <li><a href="#indicaciones">Indicaciones</a></li>
            <li><a href="#equipo">Equipo</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <main id="main-content">
        <section id="inicio" class="panel section-reveal"></section>
        <section id="misiones" class="panel section-reveal"></section>
        <section id="mundos" class="panel section-reveal"></section>
        <section id="indicaciones" class="panel section-reveal"></section>
        <section id="equipo" class="panel section-reveal"></section>
        <section id="contacto" class="panel section-reveal"></section>
    </main>

    <footer>
        <div class="footer-logo">© StepL<span>∞</span>gic</div>
        <div class="socials">
            <a href="#">Tiktok / @StepLogic_</a> | 
            <a href="#">Instagram / @StepLogic_</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Función para cargar los archivos externos dentro del scroll único
        async function loadSections() {
            const sections = ['inicio', 'misiones', 'mundos', 'indicaciones', 'equipo', 'contacto'];
            for (const section of sections) {
                const response = await fetch(`${section}.html`);
                const text = await response.text();
                // Extraemos solo el contenido dentro del body de cada archivo
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const content = doc.querySelector('.container') || doc.body;
                document.getElementById(section).innerHTML = content.innerHTML;
            }
            initAnimations(); // Iniciar GSAP después de cargar todo
        }

        function initAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.utils.toArray('.section-reveal').forEach(section => {
                gsap.from(section, {
                    scrollTrigger: {
                        trigger: section,
                        start: "top 80%",
                        toggleActions: "play none none reverse"
                    },
                    opacity: 0,
                    y: 50,
                    duration: 1,
                    ease: "power2.out"
                });
            });
        }

        window.onload = loadSections;
    </script>
</body>
</html>
